    <script>
        (function () {
            // Disable right-click (single listener)
            document.addEventListener('contextmenu', function (e) {
                e.preventDefault();
                // optional: show a non-intrusive message instead of alert
                // e.g., show a tiny toast — left out here to keep it simple
                return false;
            }, false);

            // Disable common keyboard shortcuts that open devtools or view-source
            document.addEventListener('keydown', function (e) {
                const key = e.key || '';
                const keyCode = e.keyCode || e.which || 0;
                const kl = key.toString().toLowerCase();
                const ctrlOrMeta = e.ctrlKey || e.metaKey; // ctrl (Win/Linux) or cmd (Mac)
                const shift = e.shiftKey;

                const isF12 = keyCode === 123 || kl === 'f12';
                const isCtrlShiftI = ctrlOrMeta && shift && (kl === 'i' || keyCode === 73);
                const isCtrlShiftJ = ctrlOrMeta && shift && (kl === 'j' || keyCode === 74);
                const isCtrlShiftC = ctrlOrMeta && shift && (kl === 'c' || keyCode === 67);
                const isCtrlU = ctrlOrMeta && (kl === 'u' || keyCode === 85);
                const isCtrlS = ctrlOrMeta && (kl === 's' || keyCode === 83);

                if (isF12 || isCtrlShiftI || isCtrlShiftJ || isCtrlShiftC || isCtrlU || isCtrlS) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }, false);

            // Basic DevTools detection (heuristic). Not foolproof.
            // If detected, this will hide page content (or you can redirect).
            (function devtoolsDetect() {
                let devtoolsOpen = false;
                const threshold = 160; // px difference heuristic

                function check() {
                    const widthDiff = window.outerWidth - window.innerWidth;
                    const heightDiff = window.outerHeight - window.innerHeight;
                    const open = widthDiff > threshold || heightDiff > threshold;
                    if (open && !devtoolsOpen) {
                        devtoolsOpen = true;
                        // Example action: hide content and show simple message
                        document.documentElement.style.display = 'none';
                        // You may show a message instead of hiding: alert('DevTools detected');
                    } else if (!open && devtoolsOpen) {
                        // restore if closed
                        devtoolsOpen = false;
                        document.documentElement.style.display = '';
                    }
                }

                window.addEventListener('resize', check);
                setInterval(check, 1000);
            })();

        })();
        document.addEventListener('contextmenu', function (event) {
            event.preventDefault(); // stops the right-click menu
            alert("Right-click is disabled on this page!");
        });
    </script>
